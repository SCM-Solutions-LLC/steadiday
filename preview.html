  <style>
    :root {
      --cream: #FFFBF5;
      --cream-dark: #F7F3ED;
      --teal: #1A8A7D;
      --teal-dark: #147568;
      --teal-light: #E8F5F3;
      --navy: #1E3A5F;
      --navy-light: #2D4A6F;
      --charcoal: #2D3436;
      --charcoal-light: #5A6266;
      --white: #FFFFFF;
      --gold: #D4A853;
      --gold-light: #FBF6E9;
      --success: #2E7D32;
      --alert: #C0392B;
      --alert-light: #FDEDEC;

      --border: rgba(30, 58, 95, 0.12);
      --shadow-soft: 0 8px 28px rgba(30, 58, 95, 0.08);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 22px;
      --radius-xl: 32px;

    * {

      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 18px;
    }

    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      line-height: 1.75;

    }

    img {
      max-width: 100%;
      height: auto;
    }

    a {
      color: var(--teal);
      text-decoration: none;
    }

    a:hover {
      color: var(--teal-dark);
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {

      outline-offset: 4px;

      color: var(--navy);
      line-height: 1.25;
      letter-spacing: -0.015em;
    }

    h1 {
      font-size: clamp(2.55rem, 5vw, 4rem);
    }

    h2 {
      font-size: clamp(2rem, 3.2vw, 2.7rem);
    }

    h3 {
      font-size: 1.35rem;
    }

    .container {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    .section {
      padding: 5.5rem 0;
    }

    .section-header {
      max-width: 720px;
      margin: 0 auto 3rem;
      text-align: center;
    }

    .section-label {
      display: inline-block;
      margin-bottom: 0.75rem;
      color: var(--teal-dark);
      font-size: 0.85rem;

      text-transform: uppercase;

    .section-header p {

      color: var(--charcoal-light);
      font-size: 1.18rem;
    }

    .launch-banner {
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));

      height: 30px;

    .nav-overlay {
      display: none;

      color: var(--teal-dark);

      place-items: center;

    .phone-card img {
      display: block;
      border-radius: 32px;
    }

    .qr-card {
      position: absolute;
      right: -25px;
      bottom: 70px;
      width: 245px;

      border: 1px solid var(--border);
      border-radius: var(--radius-lg);

      gap: 0.8rem;
      align-items: center;
      z-index: 3;

    .qr-card strong {
      display: block;
      color: var(--navy);
      font-size: 0.95rem;
      line-height: 1.25;
      margin-bottom: 0.25rem;
    }

    .qr-card span {
      color: var(--charcoal-light);
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .qr-card img {
      width: 92px;
      height: 92px;
      border-radius: 6px;
    }

      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 0;
    }

    .trust-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .trust-item {
      display: flex;
      gap: 0.9rem;
      align-items: center;
      padding: 1rem 1.25rem;
      border-right: 1px solid var(--border);
    }

      border-right: 0;
    }

    .trust-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: var(--teal-light);
      color: var(--teal-dark);
      font-weight: 900;
      font-size: 1.35rem;
    }

      line-height: 1.2;

      font-size: 0.92rem;
      line-height: 1.35;

      background: var(--cream-dark);

      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 1.25rem;
      max-width: 1030px;
      margin: 0 auto;
    }

    .why-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }

    .why-card.featured {
      grid-row: span 2;
      padding: 2.75rem;
      background: linear-gradient(180deg, #fff, #fff8f7);
      border-color: rgba(192, 57, 43, 0.22);
    }

    .why-kicker {
      color: var(--teal-dark);
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.6rem;
    }

    .why-card.featured .why-kicker {
      color: var(--alert);
    }

    .why-card h3 {
      margin-bottom: 0.8rem;
      font-size: 1.55rem;
    }

    .why-card p {
      color: var(--charcoal-light);
      font-size: 1.08rem;
    }

    .features {
      background: var(--cream);
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;

    .feature-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.8rem;

      width: 58px;
      height: 58px;
      background: var(--teal-light);
      color: var(--teal-dark);

      display: grid;
      place-items: center;
      margin-bottom: 1rem;
      font-weight: 900;
      font-size: 1.35rem;
    }

    .feature-card h3 {
      margin-bottom: 0.55rem;
    }

    .feature-card p {
      color: var(--charcoal-light);
      font-size: 1.02rem;
      line-height: 1.6;
    }

    .included {
      margin-top: 2rem;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
    }

    .included h3 {
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .included-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .included-list span {
      background: var(--cream-dark);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
      color: var(--navy);
      font-weight: 700;
      font-size: 0.95rem;
    }
        .how {
      background: var(--navy);
      color: var(--white);
    }

    .how .section-label {
      color: var(--gold);
    }

    .how h2,
    .how h3 {
      color: var(--white);
    }

    .step p {
      color: rgba(255, 255, 255, 0.78);
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
    }

    .step {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius-lg);
      padding: 1.6rem;
    }

      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--teal);
      color: var(--white);
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .screenshots {
      background: linear-gradient(180deg, var(--cream), var(--white));
    }

    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1rem;
    }

    .screenshot-item {
      text-align: center;
    }

    .screenshot-frame {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.65rem;
      margin-bottom: 0.6rem;
    }

    .screenshot-frame img {
      border-radius: var(--radius-md);
      display: block;
    }

    .screenshot-item h4 {

      font-size: 0.95rem;

    .pricing-description {
      color: var(--charcoal-light);
      margin-bottom: 1.6rem;
      font-size: 1.08rem;
    }

    .pricing-list {

      grid-template-columns: 1fr 1fr;
      gap: 0.65rem 1.5rem;
      text-align: left;
      margin: 0 auto 2rem;
      max-width: 560px;
    }

    .pricing-list li {
      color: var(--charcoal);

    .pricing-list li::before {

    }

      margin-top: 1rem;

      background: var(--white);

      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .faq-item {

    }

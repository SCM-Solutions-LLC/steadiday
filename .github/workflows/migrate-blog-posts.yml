name: Migrate existing blog posts

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run migration (dry run first)
        run: python scripts/update_existing_posts.py

      - name: Apply migration
        run: python scripts/update_existing_posts.py --apply

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/
          git diff --staged --quiet || git commit -m "Migrate blog posts: fresh images, dynamic layouts, video checks"
          git push
